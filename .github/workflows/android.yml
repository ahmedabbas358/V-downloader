name: Build V-Downloader APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build APK
        run: ./gradlew --no-daemon clean assembleGenericRelease --stacktrace

      - name: List generated APKs
        run: |
          echo "Generated APKs:"
          find app/build/outputs -type f -name "*.apk"

      # ARM64
      - name: Upload ARM64 APK
        uses: actions/upload-artifact@v4
        with:
          name: V-Downloader-arm64-v8a
          path: app/build/outputs/apk/generic/release/*arm64-v8a*.apk
          if-no-files-found: ignore
          retention-days: 20

      # ARMv7
      - name: Upload ARMv7 APK
        uses: actions/upload-artifact@v4
        with:
          name: V-Downloader-armeabi-v7a
          path: app/build/outputs/apk/generic/release/*armeabi-v7a*.apk
          if-no-files-found: ignore
          retention-days: 20

      # x86
      - name: Upload x86 APK
        uses: actions/upload-artifact@v4
        with:
          name: V-Downloader-x86
          path: app/build/outputs/apk/generic/release/*x86*.apk
          if-no-files-found: ignore
          retention-days: 20

      # x86_64
      - name: Upload x86_64 APK
        uses: actions/upload-artifact@v4
        with:
          name: V-Downloader-x86_64
          path: app/build/outputs/apk/generic/release/*x86_64*.apk
          if-no-files-found: ignore
          retention-days: 20

      # Universal
      - name: Upload Universal APK
        uses: actions/upload-artifact@v4
        with:
          name: V-Downloader-universal
          path: app/build/outputs/apk/generic/release/*universal*.apk
          if-no-files-found: ignore
          retention-days: 20

      # أي APK لم يتم التقاطه بالخطوات السابقة
      - name: Upload Remaining APKs
        uses: actions/upload-artifact@v4
        with:
          name: V-Downloader-Other
          path: app/build/outputs/apk/generic/release/*.apk
          if-no-files-found: ignore
          retention-days: 20