name: Build Seal Dev APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission
        run: chmod +x ./gradlew

      # 🔥 بناء نسخة واحدة فقط (مستقرة)
      - name: Build APK
        run: ./gradlew clean assembleGenericDebug

      # 🔍 تحديد مكان APK
      - name: Find APK
        run: find . -name "*.apk"

      # 📦 رفع الملف
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Seal-Dev
          path: app/build/outputs/apk/generic/debug/*.apk
          if-no-files-found: error
          retention-days: 20