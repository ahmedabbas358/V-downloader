# Project-wide Gradle settings.

# Specifies the JVM arguments used by the Gradle daemon process.
# Increased memory to prevent OutOfMemoryError during APK packaging.
org.gradle.jvmargs=-Xmx6144m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8

# Run Gradle tasks in parallel for faster builds.
org.gradle.parallel=true

# AndroidX package structure
android.useAndroidX=true

# Kotlin code style
kotlin.code.style=official

# Enables namespacing of each library's R class
android.nonTransitiveRClass=true

# Build only ARM64 architecture
ABI_FILTERS=arm64-v8a

# Use non-final resource IDs
android.nonFinalResIds=true

# Enable Gradle configuration cache
org.gradle.configuration-cache=true